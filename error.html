<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novu</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,700&f[]=general-sans@400,500,600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-font-smoothing: antialiased;
      }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0d0c14;
        color: #e8e7f0;
        font-family: "General Sans", "Helvetica Neue", sans-serif;
        padding: 32px 24px;
        text-align: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 48px;
      }
      .logo-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: rgba(139, 114, 232, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #8b72e8;
      }
      .logo-icon svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
        stroke: none;
      }
      .logo-name {
        font-family: "Zodiak", Georgia, serif;
        font-size: 22px;
        font-weight: 700;
        color: #e8e7f0;
        letter-spacing: -0.01em;
      }

      .message {
        font-family: "Zodiak", Georgia, serif;
        font-size: clamp(22px, 5vw, 32px);
        font-weight: 500;
        line-height: 1.4;
        color: #e8e7f0;
        max-width: 420px;
        margin-bottom: 16px;
      }
      .sub {
        font-size: 15px;
        color: #7b79a0;
        margin-bottom: 40px;
        max-width: 340px;
        line-height: 1.6;
      }

      .retry-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 24px;
        border-radius: 10px;
        border: 1px solid rgba(139, 114, 232, 0.3);
        background: rgba(139, 114, 232, 0.08);
        color: #8b72e8;
        font-family: "General Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 180ms cubic-bezier(0.16, 1, 0.3, 1);
        text-decoration: none;
      }
      .retry-btn:hover {
        background: rgba(139, 114, 232, 0.16);
        border-color: rgba(139, 114, 232, 0.5);
      }
      .retry-btn svg {
        width: 15px;
        height: 15px;
        opacity: 0.8;
      }

      /* Subtle star decoration */
      .star {
        font-size: 20px;
        color: rgba(139, 114, 232, 0.35);
        margin-bottom: 28px;
        letter-spacing: 12px;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
          />
        </svg>
      </div>
      <span class="logo-name">Novu</span>
    </div>

    <p class="star">✦ ✦ ✦</p>

    <h1 class="message">We're taking a moment to reflect.</h1>
    <p class="sub">Be right back.</p>

    <a class="retry-btn" href="javascript:window.location.reload()">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
        <path d="M21 3v5h-5" />
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
        <path d="M8 16H3v5" />
      </svg>
      Try again
    </a>
  </body>
</html>
