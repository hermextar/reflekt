    <meta name="generator" content="Perplexity Computer" />

    <title>Reflekt — AI Journal</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,700&f[]=general-sans@400,500,600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ─── Design System ─── */
      :root {
        --font-display: "Zodiak", Georgia, serif;
        --font-body: "General Sans", "Helvetica Neue", sans-serif;
        --color-bg: #0d0c14;
        --color-surface: #13121e;
        --color-surface-2: #171626;
        --color-border: #252336;
        --color-text: #e8e7f0;
        --color-text-muted: #7b79a0;
        --color-text-faint: #3d3b58;
        --color-primary: #8b72e8;
        --color-primary-hover: #7a5fe0;
        --color-primary-active: #6a4dd8;
        --color-primary-bg: rgba(139, 114, 232, 0.12);
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-full: 9999px;
        --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      [data-theme="light"] {
        --color-bg: #f4f3ff;
        --color-surface: #ffffff;
        --color-surface-2: #f8f7ff;
        --color-border: #e0ddf5;
        --color-text: #1a1830;
        --color-text-muted: #6b68a0;
        --color-text-faint: #b0aed0;
        --color-primary: #6c4ddf;
        --color-primary-hover: #5a3cd0;
        --color-primary-active: #4829c2;
        --color-primary-bg: rgba(108, 77, 223, 0.08);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-font-smoothing: antialiased;
        scroll-behavior: smooth;
      }
      body {
        min-height: 100dvh;
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.6;
        color: var(--color-text);
        background: var(--color-bg);
        transition:
          background var(--transition),
          color var(--transition);
      }
      button,
      input,
      textarea,
      select {
        font: inherit;
        color: inherit;
      }
      button {
        cursor: pointer;
        background: none;
        border: none;
      }
      img {
        display: block;
        max-width: 100%;
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 999px;
      }
      ::selection {
        background: rgba(139, 114, 232, 0.2);
        color: var(--color-text);
      }
      :focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
        border-radius: var(--radius-sm);
      }

      /* ─── Layout ─── */
      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* ─── Header ─── */
      .header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(13, 12, 20, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--color-border);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: background var(--transition);
      }
      [data-theme="light"] .header {
        background: rgba(244, 243, 255, 0.85);
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--color-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo-icon svg {
        width: 14px;
        height: 14px;
        stroke: white;
        fill: none;
      }
      .logo-name {
        font-family: var(--font-display);
        font-weight: 500;
        font-size: 18px;
        letter-spacing: -0.3px;
        color: var(--color-text);
      }
      .header-actions {
        display: flex;
        gap: 4px;
      }
      .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-muted);
        transition: all var(--transition);
      }
      .icon-btn:hover {
        background: var(--color-surface);
        color: var(--color-text);
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        color: var(--color-text-muted);
        padding: 6px 10px;
        border-radius: var(--radius-md);
        transition: all var(--transition);
      }
      .back-btn:hover {
        background: var(--color-surface);
        color: var(--color-text);
      }
      .back-btn svg {
        width: 16px;
        height: 16px;
      }

      /* ─── Pages ─── */
      .page {
        display: none;
        flex: 1;
        flex-direction: column;
      }
      .page.active {
        display: flex;
      }

      /* ─── Home ─── */
      .home-body {
        flex: 1;
        padding: 24px 16px;
      }
      .tagline {
        text-align: center;
        color: var(--color-text-muted);
        font-size: 13px;
        margin-bottom: 28px;
        line-height: 1.5;
      }
      .new-entry-btn {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: var(--radius-xl);
        background: var(--color-primary);
        color: white;
        margin-bottom: 28px;
        transition: all var(--transition);
        box-shadow: 0 4px 20px rgba(139, 114, 232, 0.25);
      }
      .new-entry-btn:hover {
        background: var(--color-primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 8px 28px rgba(139, 114, 232, 0.35);
      }
      .new-entry-btn:active {
        transform: translateY(0);
      }
      .new-entry-icon {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .new-entry-icon svg {
        width: 16px;
        height: 16px;
        stroke: white;
      }
      .new-entry-text {
        text-align: left;
      }
      .new-entry-text strong {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }
      .new-entry-text span {
        display: block;
        font-size: 12px;
        opacity: 0.75;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-text-muted);
        margin-bottom: 10px;
        padding: 0 4px;
      }
      .entries-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .entry-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        border-radius: var(--radius-lg);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        cursor: pointer;
        transition: all var(--transition);
      }
      .entry-card:hover {
        border-color: var(--color-primary);
        background: var(--color-surface-2);
        transform: translateX(2px);
      }
      .entry-card-body {
        flex: 1;
        min-width: 0;
      }
      .entry-card-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .mood-badge {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        font-weight: 500;
      }
      .entry-time {
        font-size: 11px;
        color: var(--color-text-faint);
        margin-left: auto;
      }
      .entry-preview {
        font-size: 13px;
        color: var(--color-text);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .entry-card-arrow {
        color: var(--color-text-faint);
        flex-shrink: 0;
        transition: color var(--transition);
      }
      .entry-card:hover .entry-card-arrow {
        color: var(--color-primary);
      }
      .entry-card-arrow svg {
        width: 16px;
        height: 16px;
      }
      .empty-state {
        text-align: center;
        padding: 48px 16px;
      }
      .empty-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 12px;
        color: var(--color-text-faint);
      }
      .empty-icon svg {
        width: 100%;
        height: 100%;
      }
      .empty-title {
        font-size: 15px;
        color: var(--color-text);
        margin-bottom: 4px;
      }
      .empty-sub {
        font-size: 13px;
        color: var(--color-text-muted);
      }

      /* ─── New Entry ─── */
      .new-entry-body {
        flex: 1;
        padding: 12px 16px 16px;
        display: flex;
        flex-direction: column;
      }
      .entry-date {
        font-size: 12px;
        color: var(--color-text-faint);
        margin-bottom: 16px;
      }
      .journal-textarea {
        flex: 1;
        width: 100%;
        min-height: 240px;
        resize: none;
        background: transparent;
        border: none;
        outline: none;
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.7;
        color: var(--color-text);
        caret-color: var(--color-primary);
      }
      .journal-textarea::placeholder {
        color: var(--color-text-faint);
      }
      .char-count {
        font-size: 12px;
        color: var(--color-text-faint);
        text-align: right;
        min-height: 16px;
        margin-bottom: 4px;
      }
      .recording-badge {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: var(--radius-md);
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .recording-badge.visible {
        display: flex;
      }
      .rec-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .action-bar {
        display: flex;
        gap: 10px;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .mic-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--color-border);
        color: var(--color-text-muted);
        transition: all var(--transition);
      }
      .mic-btn:hover {
        border-color: var(--color-primary);
        color: var(--color-primary);
      }
      .mic-btn.recording {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.3);
        color: #f87171;
      }
      .mic-btn svg {
        width: 16px;
        height: 16px;
      }
      .submit-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px;
        border-radius: var(--radius-md);
        background: var(--color-primary);
        color: white;
        font-size: 14px;
        font-weight: 600;
        transition: all var(--transition);
      }
      .submit-btn:hover:not(:disabled) {
        background: var(--color-primary-hover);
        box-shadow: 0 4px 16px rgba(139, 114, 232, 0.3);
      }
      .submit-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .submit-btn svg {
        width: 16px;
        height: 16px;
      }
      .submit-footer {
        text-align: center;
        font-size: 12px;
        color: var(--color-text-faint);
        margin-top: 8px;
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ─── Entry / Chat ─── */
      .entry-header-info {
        margin-left: auto;
        font-size: 12px;
        color: var(--color-text-faint);
      }
      .entry-content-card {
        margin: 12px 16px 0;
        border-radius: var(--radius-lg);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        overflow: hidden;
      }
      .entry-toggle {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-muted);
        transition: all var(--transition);
      }
      .entry-toggle:hover {
        color: var(--color-text);
      }
      .entry-toggle svg {
        width: 16px;
        height: 16px;
        transition: transform var(--transition);
      }
      .entry-toggle.open svg {
        transform: rotate(180deg);
      }
      .entry-text {
        padding: 0 14px 14px;
        font-size: 13px;
        line-height: 1.7;
        color: var(--color-text);
        white-space: pre-wrap;
        border-top: 1px solid var(--color-border);
      }
      .ai-label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 16px 18px 8px;
        font-size: 12px;
        color: var(--color-text-muted);
        font-weight: 500;
      }
      .ai-dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--color-primary-bg);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ai-dot svg {
        width: 12px;
        height: 12px;
        stroke: var(--color-primary);
      }
      .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 0 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }
      .msg {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }
      .msg.user {
        justify-content: flex-end;
      }
      .msg.assistant {
        justify-content: flex-start;
      }
      .msg-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--color-primary-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-bottom: 2px;
      }
      .msg-avatar svg {
        width: 12px;
        height: 12px;
        stroke: var(--color-primary);
      }
      .msg-bubble {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: var(--radius-lg);
        font-size: 14px;
        line-height: 1.6;
      }
      .msg.assistant .msg-bubble {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-bottom-left-radius: var(--radius-sm);
        color: var(--color-text);
      }
      .msg.user .msg-bubble {
        background: var(--color-primary);
        color: white;
        border-bottom-right-radius: var(--radius-sm);
      }
      .typing-bubble {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-bottom-left-radius: var(--radius-sm);
        padding: 12px 16px;
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .typing-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--color-primary);
        opacity: 0.5;
      }
      .typing-dot:nth-child(1) {
        animation: tdot 1.2s ease-in-out 0s infinite;
      }
      .typing-dot:nth-child(2) {
        animation: tdot 1.2s ease-in-out 0.2s infinite;
      }
      .typing-dot:nth-child(3) {
        animation: tdot 1.2s ease-in-out 0.4s infinite;
      }
      @keyframes tdot {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        50% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }
      .reply-area {
        border-top: 1px solid var(--color-border);
        padding: 12px 16px;
        background: var(--color-bg);
        padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      }
      .reply-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }
      .reply-input-wrap {
        flex: 1;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 10px 14px;
        transition: border-color var(--transition);
      }
      .reply-input-wrap:focus-within {
        border-color: var(--color-primary);
      }
      .reply-input {
        width: 100%;
        resize: none;
        background: transparent;
        border: none;
        outline: none;
        font-family: var(--font-body);
        font-size: 14px;
        line-height: 1.5;
        color: var(--color-text);
        max-height: 100px;
        overflow-y: auto;
      }
      .reply-input::placeholder {
        color: var(--color-text-faint);
      }
      .send-btn {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-md);
        background: var(--color-primary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all var(--transition);
      }
      .send-btn:hover:not(:disabled) {
        background: var(--color-primary-hover);
      }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .send-btn svg {
        width: 15px;
        height: 15px;
      }
      .reply-hint {
        font-size: 11px;
        color: var(--color-text-faint);
        margin-top: 6px;
        padding-left: 2px;
      }

      /* ─── Skeleton ─── */
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--color-surface) 25%,
          var(--color-surface-2) 50%,
          var(--color-surface) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
        border-radius: var(--radius-md);
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      /* ─── Footer attribution ─── */
      .pplx-footer {
        text-align: center;
        padding: 12px 16px;
        font-size: 11px;
        color: var(--color-text-faint);
      }
      .pplx-footer a {
        color: var(--color-text-faint);
        text-decoration: none;
      }
      .pplx-footer a:hover {
        color: var(--color-text-muted);
      }

      /* Mood colors */
      .mood-anxious {
        color: #eab308;
      }
      .mood-frustrated {
        color: #f97316;
      }
      .mood-sad {
        color: #60a5fa;
      }
      .mood-confused {
        color: #a78bfa;
      }
      .mood-positive {
        color: #4ade80;
      }
      .mood-tired {
        color: #94a3b8;
      }
      .mood-reflective {
        color: #818cf8;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- ═══════════════════ HOME PAGE ═══════════════════ -->
      <div id="page-home" class="page active">
        <header class="header">
          <div class="logo">
            <div class="logo-icon">
              <svg viewBox="0 0 24 24" stroke-width="2.5">
                <path
                  d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                />
              </svg>
            </div>
            <span class="logo-name">Reflekt</span>
          </div>
          <div class="header-actions">
            <button
              class="icon-btn"
              id="theme-toggle"
              aria-label="Toggle theme"
            >
              <svg
                id="theme-icon-dark"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                width="18"
                height="18"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
              <svg
                id="theme-icon-light"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                width="18"
                height="18"
                style="display: none"
              >
                <circle cx="12" cy="12" r="5" />
                <path
                  d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                />
              </svg>
            </button>
          </div>
        </header>
        <div class="home-body">
          <p class="tagline">
            A safe space to think out loud.<br />AI helps you go deeper, not
            give you answers.
          </p>
          <button class="new-entry-btn" id="go-new">
            <div class="new-entry-icon">
              <svg viewBox="0 0 24 24" stroke-width="2.5">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </div>
            <div class="new-entry-text">
              <strong>Start a new entry</strong>
              <span>Type or speak what's on your mind</span>
            </div>
          </button>
          <div class="section-label">Past Entries</div>
          <div id="entries-list" class="entries-list">
            <div class="skeleton" style="height: 72px"></div>
            <div class="skeleton" style="height: 72px; opacity: 0.6"></div>
            <div class="skeleton" style="height: 72px; opacity: 0.3"></div>
          </div>
        </div>
        <!--<div class="pplx-footer"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a></div>-->
      </div>

      <!-- ═══════════════════ NEW ENTRY PAGE ═══════════════════ -->
      <div id="page-new" class="page">
        <header class="header">
          <button class="back-btn" id="back-from-new">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M19 12H5M12 5l-7 7 7 7" />
            </svg>
            Back
          </button>
          <span style="font-size: 12px; color: var(--color-text-muted)"
            >New entry</span
          >
        </header>
        <div class="new-entry-body">
          <p class="entry-date" id="entry-date"></p>
          <textarea
            class="journal-textarea"
            id="journal-textarea"
            placeholder="What's been weighing on you?"
            rows="1"
          ></textarea>
          <div class="char-count" id="char-count"></div>
          <div class="recording-badge" id="recording-badge">
            <span class="rec-dot"></span>
            Listening… speak naturally
          </div>
          <div class="action-bar">
            <button class="mic-btn" id="mic-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="9" y="3" width="6" height="11" rx="3" />
                <path d="M5 11a7 7 0 0 0 14 0" />
                <path d="M12 18v3M8 21h8" />
              </svg>
              Speak
            </button>
            <button class="submit-btn" id="submit-btn" disabled>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
              </svg>
              Submit entry
            </button>
          </div>
          <p class="submit-footer">
            Your thoughts are never judged — only explored.
          </p>
        </div>
      </div>

      <!-- ═══════════════════ ENTRY / CHAT PAGE ═══════════════════ -->
      <div id="page-entry" class="page">
        <header class="header">
          <button class="back-btn" id="back-from-entry">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M19 12H5M12 5l-7 7 7 7" />
            </svg>
            Back
          </button>
          <span class="entry-header-info" id="entry-header-time"></span>
        </header>

        <!-- Original entry (collapsible) -->
        <div class="entry-content-card">
          <button class="entry-toggle" id="entry-toggle">
            Your entry
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
          <div
            id="entry-original-text"
            style="display: none"
            class="entry-text"
          ></div>
        </div>

        <!-- AI label -->
        <div class="ai-label">
          <div class="ai-dot">
            <svg viewBox="0 0 24 24" stroke-width="2">
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                fill="none"
                stroke="currentColor"
              />
            </svg>
          </div>
          Reflekt is exploring with you
        </div>

        <!-- Chat messages -->
        <div class="chat-container" id="chat-container"></div>

        <!-- Reply area -->
        <div class="reply-area">
          <div class="reply-row">
            <div class="reply-input-wrap">
              <textarea
                class="reply-input"
                id="reply-input"
                placeholder="Share your thoughts…"
                rows="1"
              ></textarea>
            </div>
            <button class="send-btn" id="send-btn" disabled>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
              </svg>
            </button>
          </div>
          <p class="reply-hint">Enter to send · Shift+Enter for new line</p>
        </div>
      </div>
    </div>

    <script>
      // ─── State ───
      const API = "https://reflekt-production.up.railway.app";
      let currentEntryId = null;
      let recognition = null;
      let isRecording = false;
      let entries = [];

      // ─── Theme ───
      const html = document.documentElement;
      function getTheme() {
        return html.getAttribute("data-theme") || "dark";
      }
      function setTheme(t) {
        html.setAttribute("data-theme", t);
        document.getElementById("theme-icon-dark").style.display =
          t === "dark" ? "inline" : "none";
        document.getElementById("theme-icon-light").style.display =
          t === "light" ? "inline" : "none";
      }
      // init from system preference
      if (window.matchMedia("(prefers-color-scheme: light)").matches)
        setTheme("light");
      document.getElementById("theme-toggle").addEventListener("click", () => {
        setTheme(getTheme() === "dark" ? "light" : "dark");
      });

      // ─── Navigation ───
      function showPage(id) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById("page-" + id).classList.add("active");
        window.scrollTo(0, 0);
      }

      // ─── API helpers ───
      async function apiFetch(path, opts = {}) {
        const res = await fetch(API + path, {
          headers: { "Content-Type": "application/json" },
          ...opts,
          body:
            opts.body ?
              typeof opts.body === "string" ?
                opts.body
              : JSON.stringify(opts.body)
            : undefined,
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }

      // ─── Mood config ───
      const MOOD = {
        anxious: { emoji: "😰", label: "Anxious", cls: "mood-anxious" },
        frustrated: {
          emoji: "😤",
          label: "Frustrated",
          cls: "mood-frustrated",
        },
        sad: { emoji: "😔", label: "Sad", cls: "mood-sad" },
        confused: { emoji: "😕", label: "Confused", cls: "mood-confused" },
        positive: { emoji: "🌱", label: "Positive", cls: "mood-positive" },
        tired: { emoji: "😴", label: "Tired", cls: "mood-tired" },
        reflective: {
          emoji: "💭",
          label: "Reflective",
          cls: "mood-reflective",
        },
      };
      function getMood(m) {
        return MOOD[m] || MOOD.reflective;
      }

      // ─── Time formatting ───
      function timeAgo(ts) {
        const now = Date.now(),
          d = now - ts * 1000;
        if (d < 60000) return "just now";
        if (d < 3600000) return `${Math.floor(d / 60000)}m ago`;
        if (d < 86400000) return `${Math.floor(d / 3600000)}h ago`;
        return `${Math.floor(d / 86400000)}d ago`;
      }

      // ─── HOME ───
      document
        .getElementById("go-new")
        .addEventListener("click", () => showPage("new"));
      document
        .getElementById("back-from-new")
        .addEventListener("click", () => showPage("home"));
      document
        .getElementById("back-from-entry")
        .addEventListener("click", () => {
          loadEntries();
          showPage("home");
        });

      async function loadEntries() {
        try {
          entries = await apiFetch("/api/entries");
          renderEntries();
        } catch (e) {
          renderEntries([]);
        }
      }

      function renderEntries() {
        const el = document.getElementById("entries-list");
        if (!entries.length) {
          el.innerHTML = `<div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
          <p class="empty-title">No entries yet</p>
          <p class="empty-sub">Write your first one when you're ready.</p>
        </div>`;
          return;
        }
        el.innerHTML = entries
          .map((e) => {
            const mood = getMood(e.mood);
            const preview = e.content.replace(/\n/g, " ").slice(0, 120);
            return `<div class="entry-card" onclick="openEntry(${e.id})">
          <div class="entry-card-body">
            <div class="entry-card-meta">
              <span class="mood-badge ${mood.cls}">${mood.emoji} ${mood.label}</span>
              <span class="entry-time">${timeAgo(e.createdAt)}</span>
            </div>
            <p class="entry-preview">${escHtml(preview)}${e.content.length > 120 ? "…" : ""}</p>
          </div>
          <div class="entry-card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
        </div>`;
          })
          .join("");
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ─── NEW ENTRY ───
      const textarea = document.getElementById("journal-textarea");
      const charCount = document.getElementById("char-count");
      const submitBtn = document.getElementById("submit-btn");
      const micBtn = document.getElementById("mic-btn");
      const recBadge = document.getElementById("recording-badge");

      // Set date
      document.getElementById("entry-date").textContent =
        new Date().toLocaleDateString("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric",
        });

      textarea.addEventListener("input", () => {
        textarea.style.height = "auto";
        textarea.style.height = textarea.scrollHeight + "px";
        const n = textarea.value.length;
        charCount.textContent = n > 0 ? `${n} characters` : "";
        submitBtn.disabled = n === 0;
      });

      const PROMPTS = [
        "What's been weighing on you?",
        "What's on your mind right now?",
        "How are you really feeling today?",
        "What would you like to work through?",
      ];
      textarea.placeholder =
        PROMPTS[Math.floor(Math.random() * PROMPTS.length)];

      // Speech recognition
      const hasSpeech =
        "SpeechRecognition" in window || "webkitSpeechRecognition" in window;
      if (!hasSpeech) micBtn.style.display = "none";

      micBtn.addEventListener("click", () => {
        if (isRecording) {
          recognition && recognition.stop();
          isRecording = false;
          micBtn.classList.remove("recording");
          micBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3M8 21h8"/></svg>Speak`;
          recBadge.classList.remove("visible");
        } else {
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognition = new SR();
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.lang = "en-US";
          let finalText = textarea.value;
          recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; i++) {
              if (e.results[i].isFinal)
                finalText += e.results[i][0].transcript + " ";
              else interim = e.results[i][0].transcript;
            }
            textarea.value = finalText + interim;
            textarea.dispatchEvent(new Event("input"));
          };
          recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove("recording");
            micBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3M8 21h8"/></svg>Speak`;
            recBadge.classList.remove("visible");
          };
          recognition.onerror = () => {
            isRecording = false;
            micBtn.classList.remove("recording");
            recBadge.classList.remove("visible");
          };
          recognition.start();
          isRecording = true;
          micBtn.classList.add("recording");
          micBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3M8 21h8"/></svg>Stop`;
          recBadge.classList.add("visible");
        }
      });

      submitBtn.addEventListener("click", async () => {
        const content = textarea.value.trim();
        if (!content) return;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="spinner"></div> Analyzing…';
        try {
          const entry = await apiFetch("/api/entries", {
            method: "POST",
            body: { content, title: "" },
          });
          textarea.value = "";
          textarea.style.height = "auto";
          charCount.textContent = "";
          await openEntry(entry.id);
        } catch (e) {
          alert("Something went wrong. Please try again.");
          submitBtn.disabled = false;
          submitBtn.innerHTML =
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>Submit entry';
        }
      });

      // ─── ENTRY / CHAT ───
      const entryToggle = document.getElementById("entry-toggle");
      const entryOrigText = document.getElementById("entry-original-text");
      let entryExpanded = false;
      entryToggle.addEventListener("click", () => {
        entryExpanded = !entryExpanded;
        entryOrigText.style.display = entryExpanded ? "block" : "none";
        entryToggle.classList.toggle("open", entryExpanded);
      });

      const chatContainer = document.getElementById("chat-container");
      const replyInput = document.getElementById("reply-input");
      const sendBtn = document.getElementById("send-btn");

      replyInput.addEventListener("input", () => {
        replyInput.style.height = "auto";
        replyInput.style.height = Math.min(replyInput.scrollHeight, 100) + "px";
        sendBtn.disabled = !replyInput.value.trim();
      });
      replyInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey && replyInput.value.trim()) {
          e.preventDefault();
          sendReply();
        }
      });
      sendBtn.addEventListener("click", sendReply);

      async function openEntry(id) {
        currentEntryId = id;
        entryExpanded = false;
        entryOrigText.style.display = "none";
        entryToggle.classList.remove("open");
        chatContainer.innerHTML = "";
        replyInput.value = "";
        sendBtn.disabled = true;

        try {
          const [entry, msgs] = await Promise.all([
            apiFetch(`/api/entries/${id}`),
            apiFetch(`/api/entries/${id}/messages`),
          ]);
          entryOrigText.textContent = entry.content;
          document.getElementById("entry-header-time").textContent = timeAgo(
            entry.createdAt,
          );
          renderMessages(msgs);
        } catch (e) {
          chatContainer.innerHTML =
            '<p style="text-align:center;color:var(--color-text-muted);padding:20px;font-size:13px">Could not load this entry.</p>';
        }
        showPage("entry");
      }

      function renderMessages(msgs) {
        chatContainer.innerHTML = "";
        msgs.forEach((m) => appendMessage(m.role, m.content));
        scrollChat();
      }

      function appendMessage(role, content) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        if (role === "assistant") {
          div.innerHTML = `<div class="msg-avatar"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="none" stroke="currentColor"/></svg></div>
        <div class="msg-bubble">${escHtml(content)}</div>`;
        } else {
          div.innerHTML = `<div class="msg-bubble">${escHtml(content)}</div>`;
        }
        chatContainer.appendChild(div);
      }

      function showTyping() {
        const div = document.createElement("div");
        div.className = "msg assistant";
        div.id = "typing-indicator";
        div.innerHTML = `<div class="msg-avatar"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="none" stroke="currentColor"/></svg></div>
      <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        chatContainer.appendChild(div);
        scrollChat();
      }

      function hideTyping() {
        const t = document.getElementById("typing-indicator");
        if (t) t.remove();
      }

      function scrollChat() {
        setTimeout(
          () => (chatContainer.scrollTop = chatContainer.scrollHeight),
          50,
        );
      }

      async function sendReply() {
        const content = replyInput.value.trim();
        if (!content || !currentEntryId) return;
        replyInput.value = "";
        replyInput.style.height = "auto";
        sendBtn.disabled = true;
        appendMessage("user", content);
        showTyping();
        scrollChat();
        try {
          const aiMsg = await apiFetch(`/api/entries/${currentEntryId}/reply`, {
            method: "POST",
            body: { content },
          });
          hideTyping();
          appendMessage("assistant", aiMsg.content);
          scrollChat();
        } catch (e) {
          hideTyping();
          appendMessage(
            "assistant",
            "I'm having trouble connecting right now. Please try again in a moment.",
          );
          scrollChat();
        }
      }

      // ─── Init ───
      loadEntries();
    </script>
  </body>
</html>
